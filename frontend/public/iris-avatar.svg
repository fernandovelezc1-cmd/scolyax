<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" role="img" aria-label="Iris">
  <defs>
    <linearGradient id="irHair" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dde77a"/>
      <stop offset="1" stop-color="#b3c122"/>
    </linearGradient>
    <radialGradient id="irGlow" cx="50%" cy="46%" r="55%">
      <stop offset="0%" stop-color="#c9d62f" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c9d62f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="48" cy="48" r="40" fill="url(#irGlow)"/>

  <!-- Cabello (estilo mujer): melena a los lados -->
  <path d="M20 40c-3 14 0 30 6 38 4-4 5-12 4-20-1-9 0-15 2-20Z" fill="url(#irHair)"/>
  <path d="M76 40c3 14 0 30-6 38-4-4-5-12-4-20 1-9 0-15-2-20Z" fill="url(#irHair)"/>
  <!-- Flequillo -->
  <path d="M26 34a22 22 0 0 1 44 0c-6-4-12-5-22-5s-16 1-22 5Z" fill="url(#irHair)"/>

  <!-- Antena -->
  <line x1="48" y1="20" x2="48" y2="13" stroke="#c9d62f" stroke-width="2.6" stroke-linecap="round"/>
  <circle cx="48" cy="11" r="3.4" fill="#c9d62f"/>

  <!-- Orejas / auriculares -->
  <rect x="20" y="44" width="7" height="14" rx="3.5" fill="#c9d62f"/>
  <rect x="69" y="44" width="7" height="14" rx="3.5" fill="#c9d62f"/>

  <!-- Cabeza -->
  <rect x="26" y="26" width="44" height="42" rx="16" fill="#101a2e" stroke="#c9d62f" stroke-width="2.6"/>

  <!-- Visor / cara -->
  <rect x="31" y="34" width="34" height="26" rx="12" fill="#c9d62f"/>

  <!-- Pestañas (toque femenino) -->
  <g stroke="#101a2e" stroke-width="1.8" stroke-linecap="round">
    <path d="M37 41l-2.4-2"/><path d="M41 40l-1-2.4"/>
    <path d="M59 41l2.4-2"/><path d="M55 40l1-2.4"/>
  </g>
  <!-- Ojos -->
  <circle cx="40" cy="45" r="3.4" fill="#101a2e"/>
  <circle cx="56" cy="45" r="3.4" fill="#101a2e"/>
  <circle cx="41" cy="44" r="1" fill="#fff"/>
  <circle cx="57" cy="44" r="1" fill="#fff"/>
  <!-- Sonrisa -->
  <path d="M42 52c3 3 9 3 12 0" fill="none" stroke="#101a2e" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Mejillas -->
  <circle cx="35.5" cy="51" r="2" fill="#101a2e" opacity="0.25"/>
  <circle cx="60.5" cy="51" r="2" fill="#101a2e" opacity="0.25"/>
</svg>
